<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌈 二寶降臨：贏家專屬解密牆 🔍</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #fff5f5 0%, #f0f3ff 100%);
            --boy-main: #74b9ff;
            --boy-grad: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            --girl-main: #ff7675;
            --girl-grad: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            --neutral-main: #b2bec3;
            --neutral-grad: linear-gradient(135deg, #dfe6e9 0%, #b2bec3 100%);
            --game-grad: linear-gradient(135deg, #ffeaa7 0%, #fad390 100%);
            --card-border: #dfe6e9;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: var(--primary-gradient);
            margin: 0;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #2d3436;
        }

        /* 報到遮罩 */
        .login-overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: var(--primary-gradient);
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .login-box {
            background: white;
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        .login-box input {
            width: 85%;
            padding: 12px;
            font-size: 1.2rem;
            border: 2px solid #dfe6e9;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
        }

        .choice-btn-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 25px; }
        .choice-btn { padding: 12px; font-size: 1.1rem; font-weight: bold; border: 2px solid #dfe6e9; border-radius: 15px; cursor: pointer; background: white; }
        .choice-btn.active.btn-boy { background: var(--boy-grad); border-color: var(--boy-main); }
        .choice-btn.active.btn-girl { background: var(--girl-grad); border-color: var(--girl-main); }
        .choice-btn.active.btn-neutral { background: var(--neutral-grad); border-color: var(--neutral-main); }

        .header-zone { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 2.2rem; margin: 0; color: #4a4a4a; }
        .subtitle { font-size: 1rem; color: #7f8c8d; background: rgba(255,255,255,0.7); padding: 8px 20px; border-radius: 20px; font-weight: bold; }

        /* 數據板 */
        .dashboard {
            background: white;
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0 8px 25px rgba(108,92,231,0.08);
            margin-bottom: 25px;
            width: 100%;
            max-width: 800px;
        }
        .poll-columns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .column-box { background: #f8f9fa; border-radius: 15px; padding: 10px; text-align: center; }
        .box-title { font-size: 0.9rem; font-weight: bold; }
        .box-count { font-size: 1.5rem; font-weight: 900; }
        .box-list { font-size: 0.8rem; color: #636e72; height: 50px; overflow-y: auto; }

        .bar-container { width: 100%; height: 15px; background: #dfe6e9; border-radius: 10px; overflow: hidden; display: flex; margin-top: 15px; }
        .bar-boy { background: var(--boy-grad); transition: width 0.4s; }
        .bar-girl { background: var(--girl-grad); transition: width 0.4s; }
        .bar-neutral { background: var(--neutral-grad); transition: width 0.4s; }

        /* 轉隊區 */
        .change-team-zone { display: none; gap: 8px; margin-bottom: 20px; background: white; padding: 10px 15px; border-radius: 40px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); flex-wrap: wrap; justify-content: center; }
        .mini-btn { border: none; padding: 6px 12px; font-size: 0.85rem; font-weight: bold; border-radius: 15px; cursor: pointer; }
        .mini-btn.active { outline: 2px solid #6c5ce7; box-shadow: 0 0 8px #6c5ce7; }

        /* 線索卡 */
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; width: 100%; max-width: 1000px; margin-bottom: 30px; }
        .lock-card { background: white; border: 2px solid var(--card-border); border-radius: 20px; padding: 15px; text-align: center; display: flex; flex-direction: column; justify-content: space-between; min-height: 200px; position: relative; }
        .lock-card.locked-for-me { opacity: 0.7; background: #f1f2f6; }
        .q-icon { font-size: 2rem; margin-bottom: 5px; }
        .q-number { font-size: 0.8rem; font-weight: bold; color: #6c5ce7; background: #eeecef; padding: 3px 10px; border-radius: 10px; }
        .q-text { font-size: 0.9rem; font-weight: bold; margin: 10px 0; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        .unlock-btn { background: #6c5ce7; color: white; border: none; padding: 8px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; }
        .status-tag { font-size: 0.7rem; margin-top: 5px; font-weight: bold; }

        /* 管理員控制區 */
        .admin-panel { margin-top: 50px; padding: 20px; background: #2d3436; border-radius: 20px; color: white; width: 100%; max-width: 800px; text-align: center; }
        .admin-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .admin-row { background: #444; padding: 10px; border-radius: 10px; text-align: left; }
        .admin-btn { padding: 5px 10px; font-size: 0.75rem; cursor: pointer; margin-right: 2px; border: none; border-radius: 5px; font-weight: bold; }
        .ab-boy { background: var(--boy-main); color: white; }
        .ab-girl { background: var(--girl-main); color: white; }
        .ab-all { background: #2ecc71; color: white; }
        .ab-reset { background: #e74c3c; color: white; margin-top: 20px; padding: 10px 20px; }

        /* 彈出視窗 */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 25px; width: 85%; max-width: 500px; text-align: center; }
        .answer-secret-box { font-size: 1.2rem; line-height: 1.6; background: #fff9f9; padding: 20px; border-radius: 15px; border: 2px dashed #ff7675; margin-bottom: 20px; text-align: left; }
        .action-btn { color: white; border: none; padding: 12px 25px; border-radius: 15px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loginOverlay" class="login-overlay">
        <div class="login-box">
            <h2>👶 派對報到處 🔍</h2>
            <input type="text" id="playerNameInput" placeholder="輸入您的名字" maxlength="8">
            <div class="gender-select-title">🎯 目前直覺預測：</div>
            <div class="choice-btn-group">
                <button class="choice-btn btn-boy" onclick="selectInitialTeam('boy')">💙 楊墨水 (男)</button>
                <button class="choice-btn btn-girl" onclick="selectInitialTeam('girl')">💗 楊桃芝 (女)</button>
                <button class="choice-btn btn-neutral" onclick="selectInitialTeam('neutral')">⚪ 吃瓜中立</button>
            </div>
            <button class="action-btn" style="background:#6c5ce7; width:100%;" onclick="joinParty()">進入派對</button>
        </div>
    </div>

    <div class="header-zone">
        <h1>🌈 二寶性別解密牆</h1>
        <div class="subtitle">🖋️ 楊墨水 vs 🍹 楊桃芝</div>
    </div>

    <div class="dashboard">
        <div class="poll-columns">
            <div class="column-box">
                <div class="box-title" style="color:var(--boy-main)">💙 墨水</div>
                <div class="box-count" id="count_boy">0</div>
                <div class="box-list" id="list_boy"></div>
            </div>
            <div class="column-box">
                <div class="box-title" style="color:var(--girl-main)">💗 桃芝</div>
                <div class="box-count" id="count_girl">0</div>
                <div class="box-list" id="list_girl"></div>
            </div>
            <div class="column-box">
                <div class="box-title" style="color:#7f8c8d">⚪ 中立</div>
                <div class="box-count" id="count_neutral">0</div>
                <div class="box-list" id="list_neutral"></div>
            </div>
        </div>
        <div class="bar-container">
            <div class="bar-boy" id="bar_boy"></div>
            <div class="bar-girl" id="bar_girl"></div>
            <div class="bar-neutral" id="bar_neutral"></div>
        </div>
    </div>

    <div id="changeTeamZone" class="change-team-zone">
        <span>🔄 轉隊：</span>
        <button class="mini-btn m-boy" id="mb_boy" onclick="changeCurrentTeam('boy')">投墨水</button>
        <button class="mini-btn m-girl" id="mb_girl" onclick="changeCurrentTeam('girl')">投桃芝</button>
        <button class="mini-btn m-neutral" id="mb_neutral" onclick="changeCurrentTeam('neutral')">選中立</button>
    </div>

    <div class="grid-container">
        <div class="lock-card" id="card1">
            <div class="q-icon">🗺️</div><div class="q-number">線索 1</div>
            <div class="q-text">【清宮圖預測】計算結果是？</div>
            <button class="unlock-btn" onclick="openClue(1)">🔓 查看答案</button>
            <div class="status-tag" id="status1" style="color:#999">尚未開放</div>
        </div>
        <div class="lock-card" id="card2">
            <div class="q-icon">🤰</div><div class="q-number">線索 2</div>
            <div class="q-text">【親密接觸】親手摸摸肚子</div>
            <button class="unlock-btn" onclick="openClue(2)">🔓 查看答案</button>
            <div class="status-tag" id="status2" style="color:#999">尚未開放</div>
        </div>
        <div class="lock-card" id="card3">
            <div class="q-icon">👶</div><div class="q-number">線索 3</div>
            <div class="q-text">【大寶直覺】他都喊些什麼？</div>
            <button class="unlock-btn" onclick="openClue(3)">🔓 查看答案</button>
            <div class="status-tag" id="status3" style="color:#999">尚未開放</div>
        </div>
        <div class="lock-card" id="card4">
            <div class="q-icon">✨</div><div class="q-number">線索 4</div>
            <div class="q-text">【外貌學】生男醜生女美？</div>
            <button class="unlock-btn" onclick="openClue(4)">🔓 查看答案</button>
            <div class="status-tag" id="status4" style="color:#999">尚未開放</div>
        </div>
        <div class="lock-card" id="card5">
            <div class="q-icon">🧮</div><div class="q-number">線索 5</div>
            <div class="q-text">【古老口訣】七七四十九結果</div>
            <button class="unlock-btn" onclick="openClue(5)">🔓 查看答案</button>
            <div class="status-tag" id="status5" style="color:#999">尚未開放</div>
        </div>
        <div class="lock-card" id="card6">
            <div class="q-icon">🍋</div><div class="q-number">線索 6</div>
            <div class="q-text">【酸男辣女】口味驚人大洗牌</div>
            <button class="unlock-btn" onclick="openClue(6)">🔓 查看答案</button>
            <div class="status-tag" id="status6" style="color:#999">尚未開放</div>
        </div>
    </div>

    <div class="admin-panel" id="adminPanel">
        <h3 style="margin:0">🛠️ 主辦人控制台 (筆電專用)</h3>
        <div class="admin-grid" id="adminControlArea"></div>
        <button class="ab-reset" onclick="resetAll()">🚨 全場強制歸零</button>
    </div>

    <div class="modal" id="clueModal">
        <div class="modal-content">
            <h3 id="modalTitle">線索答案</h3>
            <div class="answer-secret-box" id="clueAnswer"></div>
            <button class="action-btn" style="background:#2d3436" onclick="closeModal()">關閉</button>
        </div>
    </div>

    <script>
        // Supabase 連線
        const sbUrl = "https://gqfscitqhywreujgskdr.supabase.co";
        const sbKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdxZnNjaXRxaHl3cmV1amdza2RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTU2OTAwMDAsImV4cCI6MjAyNzI2MDAwMH0.1vT8_pX9eJkW3i-FmN8vXn4rVp-7XgXW4z6bX1Y0ZQw";
        const supabaseClient = supabase.createClient(sbUrl, sbKey);

        const answers = {
            1: "解析：經過對照，清宮圖計算結果是：【男生】！🖋️ 楊墨水隊得一分！",
            2: "解析：恭喜贏家！【本隊所有女性隊員，現在可以現場實際摸摸媽媽的肚子！】🤰",
            3: "解析：大寶非常肯定地狂喊：『是妹妹！肚子裡面是妹妹！』👶",
            4: "解析：媽媽皮膚一直超級美、發亮！✨ 依照外貌學，這很可能是小公主呀！",
            5: "解析：經過繁雜數學口訣計算，結果指向了【男孩】！🖋️",
            6: "解析：媽媽排斥甜食、不愛咖啡(苦)，但酸辣都吃！台下偵探們開始燒腦了吧！"
        };

        let myId = localStorage.getItem("party_id") || 'u_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem("party_id", myId);
        let myName = localStorage.getItem("party_name") || "";
        let myTeam = localStorage.getItem("party_team") || "";
        let globalPlayers = {};
        let clueAccess = { 1:'none', 2:'none', 3:'none', 4:'none', 5:'none', 6:'none' };
        let channel = null;

        window.onload = function() {
            initAdminUI();
            initSync();
            if (myName) {
                document.getElementById("loginOverlay").style.display = "none";
                document.getElementById("changeTeamZone").style.display = "flex";
                updateMiniBtns();
            }
        };

        function initSync() {
            channel = supabaseClient.channel('babyshower_v3', { config: { broadcast: { self: true } } });
            channel.on('broadcast', { event: 'update' }, ({ payload }) => {
                if (payload.type === 'players') {
                    globalPlayers = Object.assign({}, globalPlayers, payload.data);
                    renderDashboard();
                }
                if (payload.type === 'access') {
                    clueAccess = Object.assign({}, clueAccess, payload.data);
                    updateClueUI();
                }
                if (payload.type === 'clear') {
                    localStorage.clear(); location.reload();
                }
            }).on('broadcast', { event: 'ask' }, () => {
                if (myName) sendPlayerStatus();
                sendAccessStatus();
            }).subscribe((status) => {
                if (status === 'SUBSCRIBED') {
                    channel.send({ type: 'broadcast', event: 'ask' });
                    if (myName) sendPlayerStatus();
                }
            });
        }

        function joinParty() {
            myName = document.getElementById("playerNameInput").value.trim();
            if (!myName || !myTeam) return alert("請輸入名字並選隊！");
            localStorage.setItem("party_name", myName);
            localStorage.setItem("party_team", myTeam);
            document.getElementById("loginOverlay").style.display = "none";
            document.getElementById("changeTeamZone").style.display = "flex";
            updateMiniBtns();
            sendPlayerStatus();
        }

        function selectInitialTeam(t) {
            myTeam = t;
            document.querySelectorAll(".choice-btn").forEach(b => b.classList.remove("active"));
            document.querySelector(".btn-"+t).classList.add("active");
        }

        function changeCurrentTeam(t) {
            myTeam = t;
            localStorage.setItem("party_team", t);
            updateMiniBtns();
            sendPlayerStatus();
        }

        function updateMiniBtns() {
            document.querySelectorAll(".mini-btn").forEach(b => b.classList.remove("active"));
            document.getElementById("mb_"+myTeam).classList.add("active");
        }

        function sendPlayerStatus() {
            let data = {}; data[myId] = { name: myName, team: myTeam };
            channel.send({ type: 'broadcast', event: 'update', payload: { type: 'players', data: data } });
            renderDashboard();
        }

        function renderDashboard() {
            let c = { boy:0, girl:0, neutral:0 }, l = { boy:[], girl:[], neutral:[] };
            Object.values(globalPlayers).forEach(p => {
                c[p.team]++; l[p.team].push(p.name);
            });
            document.getElementById("count_boy").innerText = c.boy;
            document.getElementById("count_girl").innerText = c.girl;
            document.getElementById("count_neutral").innerText = c.neutral;
            document.getElementById("list_boy").innerText = l.boy.join(", ");
            document.getElementById("list_girl").innerText = l.girl.join(", ");
            document.getElementById("list_neutral").innerText = l.neutral.join(", ");
            let total = c.boy + c.girl + c.neutral || 1;
            document.getElementById("bar_boy").style.width = (c.boy/total*100) + "%";
            document.getElementById("bar_girl").style.width = (c.girl/total*100) + "%";
            document.getElementById("bar_neutral").style.width = (c.neutral/total*100) + "%";
        }

        // --- 權限解鎖邏輯 ---
        function updateClueUI() {
            for(let i=1; i<=6; i++) {
                let status = clueAccess[i];
                let tag = document.getElementById("status"+i);
                let card = document.getElementById("card"+i);
                if (status === 'none') {
                    tag.innerText = "尚未開放"; tag.style.color = "#999";
                    card.classList.add("locked-for-me");
                } else if (status === 'all') {
                    tag.innerText = "已開放全場"; tag.style.color = "#2ecc71";
                    card.classList.remove("locked-for-me");
                } else {
                    let teamName = (status === 'boy') ? "墨水隊" : "桃芝隊";
                    tag.innerText = "限 " + teamName + " 查看";
                    tag.style.color = (status === 'boy') ? "var(--boy-main)" : "var(--girl-main)";
                    if (myTeam === status) card.classList.remove("locked-for-me");
                    else card.classList.add("locked-for-me");
                }
            }
        }

        function openClue(i) {
            let status = clueAccess[i];
            if (status === 'all' || myTeam === status) {
                document.getElementById("clueAnswer").innerText = answers[i];
                document.getElementById("clueModal").style.display = "flex";
            } else {
                alert("🔒 只有贏家【" + (status === 'boy' ? '墨水隊' : '桃芝隊') + "】才能看！輸的隊伍請看他們的表情猜答案。");
            }
        }

        function closeModal() { document.getElementById("clueModal").style.display = "none"; }

        // --- 管理員控制 ---
        function initAdminUI() {
            let html = "";
            for(let i=1; i<=6; i++) {
                html += "<div class='admin-row'>線索 "+i+": " +
                    "<button class='admin-btn ab-boy' onclick='unlockTo("+i+",\"boy\")'>男勝</button>" +
                    "<button class='admin-btn ab-girl' onclick='unlockTo("+i+",\"girl\")'>女勝</button>" +
                    "<button class='admin-btn ab-all' onclick='unlockTo("+i+",\"all\")'>全場</button></div>";
            }
            document.getElementById("adminControlArea").innerHTML = html;
        }

        function unlockTo(clueId, team) {
            let data = {}; data[clueId] = team;
            channel.send({ type: 'broadcast', event: 'update', payload: { type: 'access', data: data } });
        }

        function sendAccessStatus() {
            channel.send({ type: 'broadcast', event: 'update', payload: { type: 'access', data: clueAccess } });
        }

        function resetAll() {
            if(confirm("確定強制歸零嗎？全場手機都會重新整理。")) {
                channel.send({ type: 'broadcast', event: 'clear' });
            }
        }
    </script>
</body>
</html>
